<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard | 0xMalCore</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#0d1117; color:white;">

<div class="container mt-5">

    <h2 class="text-info mb-4">Admin Control Panel</h2>

    <div class="row">

        <div class="col-md-6">
            <h4>Live Employee Activity</h4>
            <ul class="list-group">
                {{LOGS}}
            </ul>
        </div>

        <div class="col-md-6">
            <h4>Post Notice</h4>
            <form method="POST">
                <input type="hidden" name="admin_notice" value="true">
                <input type="text" name="message" class="form-control mb-2" placeholder="Enter Notice" required>
                <button class="btn btn-info w-100">Post Notice</button>
            </form>

            <h5 class="mt-4">Current Notices</h5>
            <ul class="list-group">
                {{NOTICES}}
            </ul>
        </div>

    </div>

    <div class="mt-4">
        <a href="/" class="btn btn-outline-light">Logout</a>
    </div>

</div>

</body>
</html>
